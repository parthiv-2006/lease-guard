  <!-- React 18 -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #f6f3ee;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #181614;
    }
    #root { height: 100%; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd8cf; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c5bfb5; }

    /* Remove default button/select styles */
    button { font-family: 'DM Sans', sans-serif; }
    select { font-family: 'DM Sans', sans-serif; outline: none; }
    a { font-family: 'DM Sans', sans-serif; }

    /* Smooth transitions */
    * { transition-property: none; }

    /* Text wrap */
    p, li { text-wrap: pretty; }
  </style>

<body>
  <div id="root"></div>

  <!-- Mock data (plain JS) -->
