<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeaseGuard — Read what you sign.</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #f6f3ee;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #181614;
    }
    #root { height: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd8cf; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c5bfb5; }

    /* PDF pane — darker scrollbar to match dark bg */
    .pdf-scroll::-webkit-scrollbar-thumb { background: #5a5a5a; }
    .pdf-scroll::-webkit-scrollbar-thumb:hover { background: #707070; }

    button, select, a { font-family: 'DM Sans', sans-serif; }
    p, li { text-wrap: pretty; }

    /* Suppress global transition overrides from original */
    * { transition-property: none; }

    /* Re-enable transitions only for elements that need them */
    .pdf-clause-section,
    .clause-card-header,
    .nav-item,
    .split-btn {
      transition-property: background, border-color, color, padding, transform, opacity, filter;
      transition-duration: 0.2s;
      transition-timing-function: ease;
    }
    .pdf-clause-section {
      transition-duration: 0.4s;
    }
  </style>

      <path d="M9 24c0-7.8 3.8-11.5 7.5-9.8" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <text x="8" y="27" font-size="6.5" fill="#c2410c" font-family="serif" font-weight="700">7.2</text>
      <rect x="5" y="38" width="18" height="1.8" rx="0.9" fill="#3a3532"/>
      <rect x="5" y="44" width="14" height="1.8" rx="0.9" fill="#252220"/>
      <rect x="5" y="50" width="16" height="1.8" rx="0.9" fill="#252220"/>

      <rect x="35" y="16" width="24" height="1" rx="0.5" fill="#ddd8cf"/>
      <!-- Highlighted clause in PDF -->
      <rect x="35" y="22" width="32" height="14" rx="1" fill="#fef2f2"/>

      <rect x="39" y="25" width="20" height="1.2" rx="0.6" fill="#b91c1c"/>
      <rect x="39" y="29" width="28" height="1" rx="0.5" fill="#9a9590"/>
      <rect x="39" y="32" width="24" height="1" rx="0.5" fill="#9a9590"/>
      <rect x="35" y="40" width="32" height="1.2" rx="0.6" fill="#ddd8cf"/>
      <rect x="35" y="45" width="32" height="1.2" rx="0.6" fill="#ddd8cf"/>

      <rect x="78" y="8" width="38" height="18" rx="2" fill="#fff" stroke="#e8e4dc" stroke-width="0.5"/>

      <rect x="83" y="56" width="24" height="1" rx="0.5" fill="#ddd8cf"/>
    </svg>

</head>
<body>
  <div id="root"></div>

  <!-- Mock data -->
  <script src="lg-data.js"></script>

  <!-- Shared components (RiskArc, RiskBadge, Icon, StatCard, CopyButton, etc.) -->
  <script type="text/babel" src="lg-shared.jsx"></script>

  <!-- Tweaks panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Page components (unchanged) -->
  <script type="text/babel" src="lg-landing.jsx"></script>
  <script type="text/babel" src="lg-processing.jsx"></script>
  <script type="text/babel" src="lg-overview.jsx"></script>

  <!-- NEW: Split-screen PDF viewer -->

</html>
