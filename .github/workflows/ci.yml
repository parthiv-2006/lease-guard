name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same branch/PR when a newer commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: TypeScript type-checking ──────────────────────────────────────
  # Runs in parallel with the test job. Checks both the Next.js app and the
  # MCP server (which has its own tsconfig with NodeNext module resolution).
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Cache the global npm store keyed on both lock files so that
          # both `npm ci` calls below benefit from the same warm cache.
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp-server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Typecheck — Next.js app
        run: npx tsc --noEmit

      - name: Typecheck — MCP server
        working-directory: mcp-server
        run: npx tsc --noEmit

  # ─── Job 2: Unit tests ────────────────────────────────────────────────────
  # Runs in parallel with typecheck. All external services (Supabase, Anthropic,
  # Gemini) are mocked in __tests__/setup.ts — no real credentials are needed.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test -- --ci --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        # Upload even when tests fail so the report is always inspectable.
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Job 3: Production build ──────────────────────────────────────────────
  # Runs only after both typecheck and test pass. Verifies that:
  #   • The MCP server compiles to dist/ without errors
  #   • The Next.js app produces a clean production build
  #
  # Real API keys are not required for a build check. Stub values are used so
  # that Next.js can resolve NEXT_PUBLIC_* references at build time. When real
  # secrets are added to the repository's GitHub Secrets, those values take
  # precedence automatically via the `|| 'ci-stub'` fallback pattern.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp-server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build MCP server
        working-directory: mcp-server
        run: npm run build

      - name: Build Next.js (production)
        run: npm run build
        env:
          # Use real secrets when available; fall back to stubs for forks and
          # open PRs where secrets are intentionally absent.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-stub-key' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-stub-key' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-key' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-key' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'ci-stub-key' }}

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          # .next/standalone and static assets — useful for deploy workflows
          # that consume this CI run's output.
          path: |
            .next/
            !.next/cache
          retention-days: 3

  # ─── Job 4: E2E Tests (Playwright) ───────────────────────────────────────
  # Runs after build passes. Uses Playwright + Chromium to verify:
  #   • Landing page renders correctly
  #   • All static/info pages load without errors (no DB required)
  #   • Report page — all 8 panels, PDF viewer, RAG grounding drawer
  #   • "Ask Your Lease" chat panel — open/close, starter chips, input state
  #
  # DB-dependent tests (report + chat panels) require real Supabase credentials.
  # When secrets are absent (forks / public PRs), those tests are automatically
  # skipped via the E2E_SKIP_DB_TESTS environment variable.
  #
  # Test files:
  #   e2e/landing.spec.ts       — 8 tests  (no DB)
  #   e2e/static-pages.spec.ts  — 12 tests (no DB)
  #   e2e/report.spec.ts        — 15 tests (DB: known-good lease IDs)
  #   e2e/chat.spec.ts          — 13 tests (DB: known-good lease ID)
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      # Detect whether real Supabase credentials are available.
      # When SUPABASE_URL falls back to the placeholder, DB-connected tests
      # are skipped automatically (report page can't load without real data).
      - name: Detect real DB credentials
        id: creds
        run: |
          if [ "$SUPABASE_URL" = "https://placeholder.supabase.co" ]; then
            echo "skip_db=1" >> $GITHUB_OUTPUT
            echo "::notice::Supabase secrets not available — DB-dependent E2E tests will be skipped"
          else
            echo "skip_db=" >> $GITHUB_OUTPUT
            echo "::notice::Supabase secrets available — all E2E tests will run"
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}

      - name: Run E2E tests
        run: npx playwright test --reporter=list,html
        env:
          # App runtime credentials
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'ci-stub-key' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-stub-key' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-stub-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-stub-key' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-key' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'ci-stub-key' }}
          # Known-good lease IDs for report/chat tests.
          # Add E2E_LEASE_FAULTY and E2E_LEASE_COMPLIANT to GitHub Secrets —
          # the placeholder UUIDs cause DB-dependent E2E tests to skip
          # gracefully when secrets are absent (same as E2E_SKIP_DB_TESTS=1).
          E2E_LEASE_FAULTY: ${{ secrets.E2E_LEASE_FAULTY || '00000000-0000-0000-0000-000000000001' }}
          E2E_LEASE_COMPLIANT: ${{ secrets.E2E_LEASE_COMPLIANT || '00000000-0000-0000-0000-000000000002' }}
          # Skip DB tests when running without real credentials
          E2E_SKIP_DB_TESTS: ${{ steps.creds.outputs.skip_db }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test failure screenshots & videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: test-results/
          retention-days: 7
